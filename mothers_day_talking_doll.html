<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Mother's Day | Special Talking Doll Surprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Montserrat:wght@300;400;600&family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --deep-rose: #880e4f;
            --rose-accent: #ad1457;
            --soft-pink: #fce4ec;
            --gold: #d4af37;
            --cream: #fff8e1;
            --glass: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --transition-slow: 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-mid: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: radial-gradient(circle at center, transparent, rgba(136, 14, 79, 0.05)), url('mothers_day_floral_bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: rgba(136, 14, 79, 0.1);
            backdrop-filter: blur(2px);
            z-index: 0;
        }

        #mainScreen {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            gap: 2rem;
            padding: 2rem;
        }

        /* Premium Gift Box */
        .box-wrap {
            position: relative;
            width: 240px;
            height: 260px;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.5s ease;
        }

        .box-wrap:hover {
            transform: scale(1.05);
        }

        .box-body {
            position: absolute;
            bottom: 0;
            left: 20px;
            width: 200px;
            height: 180px;
            background: linear-gradient(135deg, var(--deep-rose), #5e0a36);
            border-radius: 0 0 12px 12px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .ribbon-v {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 100%;
            background: linear-gradient(to right, var(--gold), #b38f2d, var(--gold));
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.2);
        }

        .lid {
            position: absolute;
            top: 15px;
            left: 0;
            width: 240px;
            height: 70px;
            background: linear-gradient(135deg, var(--rose-accent), var(--deep-rose));
            border-radius: 8px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            transform-origin: top center;
            transition: transform 1.5s cubic-bezier(.23, 1, .32, 1);
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .lid::after {
            content: '';
            width: 240px;
            height: 30px;
            background: linear-gradient(to right, var(--gold), #b38f2d, var(--gold));
            box-shadow: inset 0 0 5px rgba(0, 0, 0, 0.2);
        }

        .lid.open {
            transform: rotateX(-160deg) translateY(-50px);
        }

        .bow {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 4rem;
            z-index: 25;
            filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.3));
            animation: bob 3s ease-in-out infinite;
        }

        @keyframes bob {

            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }

            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        /* Professional Buttons */
        .open-btn {
            background: linear-gradient(135deg, var(--gold), #b38f2d);
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            border-radius: 50px;
            font-family: 'Montserrat', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0% {
                box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
            }

            50% {
                box-shadow: 0 10px 50px rgba(212, 175, 55, 0.7);
            }

            100% {
                box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
            }
        }

        .open-btn:hover {
            transform: translateY(-5px);
        }

        .open-btn.gone {
            opacity: 0;
            pointer-events: none;
        }

        /* Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            background: radial-gradient(circle at center, rgba(136, 14, 79, 0.95), rgba(0, 0, 0, 0.98));
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
            overflow-y: auto;
        }

        #overlay.on {
            opacity: 1;
            pointer-events: all;
        }

        .big-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            color: var(--cream);
            text-align: center;
            margin-top: 2rem;
            opacity: 0;
            transform: translateY(30px);
            transition: 1s ease-out 0.5s;
        }

        #overlay.on .big-text {
            opacity: 1;
            transform: translateY(0);
        }

        .sub-text {
            font-family: 'Caveat', cursive;
            font-size: 2rem;
            color: var(--gold);
            margin-bottom: 3rem;
            opacity: 0;
            transition: 1s ease-out 0.8s;
        }

        #overlay.on .sub-text {
            opacity: 1;
        }

        /* Doll Section */
        .doll-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            margin: 2rem 0;
        }

        .speech-bubble {
            background: white;
            padding: 20px 30px;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            font-family: 'Montserrat', sans-serif;
            text-align: center;
            max-width: 350px;
            position: relative;
            opacity: 0;
            transform: scale(0.8);
            transition: 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 1.2s;
        }

        #overlay.on .speech-bubble {
            opacity: 1;
            transform: scale(1);
        }

        .speech-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid white;
        }

        .doll-wrap {
            width: 140px;
            height: 200px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-15px);
            }
        }

        /* Detailed CSS Doll */
        .doll {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .doll-head {
            width: 80px;
            height: 85px;
            background: #ffe0bd;
            border-radius: 50% 50% 45% 45%;
            border: 2px solid #5e3a24;
            position: relative;
            z-index: 5;
        }

        .doll-hair {
            position: absolute;
            top: -10px;
            width: 90px;
            height: 50px;
            background: #4e342e;
            border-radius: 50% 50% 0 0;
            z-index: 6;
        }

        .doll-eyes::before,
        .doll-eyes::after {
            content: '';
            position: absolute;
            top: 35px;
            width: 10px;
            height: 10px;
            background: #333;
            border-radius: 50%;
        }

        .doll-eyes::before {
            left: 20px;
        }

        .doll-eyes::after {
            right: 20px;
        }

        .doll-mouth {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 10px;
            border-bottom: 4px solid #e91e63;
            border-radius: 50%;
            transition: 0.1s;
        }

        .talking .doll-mouth {
            animation: talk 0.2s infinite alternate;
            height: 15px;
            background: #e91e63;
            border-radius: 50%;
        }

        @keyframes talk {
            0% {
                height: 5px;
            }

            100% {
                height: 15px;
            }
        }

        .doll-body {
            width: 90px;
            height: 100px;
            background: linear-gradient(135deg, var(--rose-accent), var(--deep-rose));
            border-radius: 20px 20px 10px 10px;
            border: 2px solid #5e3a24;
            margin-top: -5px;
            z-index: 4;
            position: relative;
        }

        .doll-arm-l,
        .doll-arm-r {
            position: absolute;
            top: 10px;
            width: 22px;
            height: 50px;
            background: #ffe0bd;
            border-radius: 10px;
            border: 2px solid #5e3a24;
            transform-origin: top center;
        }

        .doll-arm-l {
            left: -15px;
            transform: rotate(20deg);
        }

        .doll-arm-r {
            right: -15px;
            transform: rotate(-20deg);
            animation: wave-doll 2s infinite ease-in-out;
        }

        @keyframes wave-doll {

            0%,
            100% {
                transform: rotate(-20deg);
            }

            50% {
                transform: rotate(-60deg);
            }
        }

        /* Photo Gallery Frame */
        .photo-gallery {
            display: flex;
            gap: 20px;
            margin-top: 3rem;
            opacity: 0;
            transform: translateY(30px);
            transition: 1s ease-out 1.5s;
        }

        #overlay.on .photo-gallery {
            opacity: 1;
            transform: translateY(0);
        }

        .photo-frame {
            width: 160px;
            height: 200px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .photo-frame:hover {
            transform: scale(1.05) translateY(-10px);
            background: rgba(255, 255, 255, 0.15);
        }

        .photo-frame img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--gold);
        }

        .photo-frame span {
            font-size: 0.75rem;
            color: var(--cream);
            text-align: center;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .close-btn:hover {
            background: var(--rose-accent);
            transform: rotate(90deg);
        }

        /* Particle Canvas */
        #confetti-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 105;
        }
    </style>
</head>

<body>

    <div class="bg-overlay"></div>
    <canvas id="confetti-canvas"></canvas>

    <div id="mainScreen">
        <div class="box-wrap" onclick="triggerTap(event)" id="giftBox">
            <div class="bow">🎀</div>
            <div class="lid" id="lid"></div>
            <div class="box-body">
                <div class="ribbon-v"></div>
            </div>
        </div>
        <button class="open-btn" id="openBtn" onclick="openGift()">🎁 Reveal Surprise</button>
        <p style="color: var(--deep-rose); font-size: 0.8rem; letter-spacing: 1px;">TAP THE GIFT BOX 💕</p>
    </div>

    <div id="overlay">
        <button class="close-btn" onclick="closeGift()">×</button>

        <h1 class="big-text">Happy Mother's Day</h1>
        <p class="sub-text">From Murtajiz with Love 💖</p>

        <div class="doll-container">
            <div class="speech-bubble" id="bubble">
                <p style="font-weight: 600; color: var(--deep-rose); margin-bottom: 10px;">Hello Miss Nazia! ✨</p>
                <p style="font-size: 0.9rem; line-height: 1.5; color: #444;">
                    Lagta hai aaj <b>Mother's Day</b> hai — toh aapko <b>Murtajiz</b> ki taraf se bahut bahut Mubarak!
                    🌸
                </p>
                <div id="speaking-indicator" style="margin-top: 10px; display: none;">
                    <span style="font-size: 0.7rem; color: #888;">Talking...</span>
                </div>
            </div>

            <div class="doll-wrap">
                <div class="doll" id="doll">
                    <div class="doll-head">
                        <div class="doll-hair"></div>
                        <div class="doll-eyes"></div>
                        <div class="doll-mouth"></div>
                    </div>
                    <div class="doll-body">
                        <div class="doll-arm-l"></div>
                        <div class="doll-arm-r"></div>
                    </div>
                </div>
            </div>

            <button onclick="speakAgain()"
                style="background: var(--glass); border: 1px solid var(--glass-border); color: white; padding: 8px 20px; border-radius: 20px; font-size: 0.8rem; cursor: pointer;">🔊
                Hear Again</button>
        </div>

        <div class="photo-gallery">
            <div class="photo-frame">
                <img src="family_photo.jpg" alt="Memory">
                <span>Nazia Aunty & Murtajiz ❤️</span>
            </div>
            <div class="photo-frame">
                <div
                    style="width: 100%; height: 130px; background: rgba(255,255,255,0.05); border: 1px dashed var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
                    📸</div>
                <span>Special Moment 🌷</span>
            </div>
            <div class="photo-frame">
                <div
                    style="width: 100%; height: 130px; background: rgba(255,255,255,0.05); border: 1px dashed var(--gold); border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
                    ✨</div>
                <span>Family Love 💕</span>
            </div>
        </div>

        <audio id="bg-music" loop>
            <source src="https://www.chosic.com/wp-content/uploads/2021/04/Warm-Memories-Emotional-Inspiring-Piano.mp3"
                type="audio/mpeg">
        </audio>
    </div>

    <script>
        const lid = document.getElementById('lid');
        const overlay = document.getElementById('overlay');
        const openBtn = document.getElementById('openBtn');
        const doll = document.getElementById('doll');
        const bgMusic = document.getElementById('bg-music');
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const colors = ['#880e4f', '#d4af37', '#fce4ec', '#fff'];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.size = Math.random() * 8 + 4;
                this.speedY = Math.random() * 3 + 2;
                this.speedX = (Math.random() - 0.5) * 2;
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.rotation = Math.random() * 360;
                this.rotationSpeed = Math.random() * 2 - 1;
            }
            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.rotation += this.rotationSpeed;
                if (this.y > canvas.height) this.reset();
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation * Math.PI / 180);
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
                ctx.restore();
            }
        }

        function initParticles() {
            for (let i = 0; i < 100; i++) particles.push(new Particle());
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }

        // Speech Logic
        const SPEECH_TEXT = "Hello Miss Nazia! Lagta hai aaj Mother's Day hai — toh aapko Murtajiz ki taraf se Happy Mother's Day! Aap duniya ki sab se achi Mama hain. Bahut bahut pyaar aapko!";

        function speak() {
            if (!('speechSynthesis' in window)) return;

            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(SPEECH_TEXT);
            const voices = window.speechSynthesis.getVoices();
            const preferredVoice = voices.find(v => v.lang.includes('hi') || v.lang.includes('IN')) || voices[0];

            utterance.voice = preferredVoice;
            utterance.pitch = 1.2;
            utterance.rate = 0.9;

            utterance.onstart = () => {
                doll.classList.add('talking');
                document.getElementById('speaking-indicator').style.display = 'block';
            };
            utterance.onend = () => {
                doll.classList.remove('talking');
                document.getElementById('speaking-indicator').style.display = 'none';
            };

            window.speechSynthesis.speak(utterance);
        }

        function speakAgain() { speak(); }

        function openGift() {
            lid.classList.add('open');
            openBtn.classList.add('gone');

            setTimeout(() => {
                overlay.classList.add('on');
                bgMusic.play();
                initParticles();
                animateParticles();
                setTimeout(speak, 2000);
            }, 1000);
        }

        function closeGift() {
            overlay.classList.remove('on');
            lid.classList.remove('open');
            openBtn.classList.remove('gone');
            window.speechSynthesis.cancel();
            bgMusic.pause();
            bgMusic.currentTime = 0;
            particles = [];
        }

        function triggerTap(e) {
            const tapEffect = document.createElement('div');
            tapEffect.innerHTML = '💖';
            tapEffect.style.position = 'fixed';
            tapEffect.style.left = e.clientX + 'px';
            tapEffect.style.top = e.clientY + 'px';
            tapEffect.style.pointerEvents = 'none';
            tapEffect.style.fontSize = '2rem';
            tapEffect.style.zIndex = '1000';
            tapEffect.animate([
                { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                { transform: 'translate(-50%, -150%) scale(2)', opacity: 0 }
            ], { duration: 1000, easing: 'ease-out' });
            document.body.appendChild(tapEffect);
            setTimeout(() => tapEffect.remove(), 1000);
        }

        // Preload voices
        window.speechSynthesis.getVoices();
    </script>
</body>

</html>
